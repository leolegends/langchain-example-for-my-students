<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AcmePass · Suporte</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="aurora" aria-hidden="true">
      <span class="aurora-blob aurora-blob-1"></span>
      <span class="aurora-blob aurora-blob-2"></span>
      <span class="aurora-blob aurora-blob-3"></span>
    </div>

    <main class="chat-app">
      <header class="chat-header">
        <div class="brand">
          <span class="brand-mark">
            AP
            <span class="brand-ring" aria-hidden="true"></span>
          </span>
          <div class="brand-text">
            <strong>AcmePass</strong>
            <span class="status">
              <span class="status-dot" aria-hidden="true"></span>
              Agente online · treinamento
            </span>
          </div>
        </div>
        <button id="btn-limpar" class="btn-ghost" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7" />
            <path d="M3 4v5h5" />
          </svg>
          Nova conversa
        </button>
      </header>

      <section id="lista-mensagens" class="mensagens" aria-live="polite">
        <div class="msg msg-agente">
          <p>
            Oi! Sou o assistente do AcmePass. Posso responder sobre ativacao, limite,
            onde usar, cartao perdido, reembolso, ou consultar um endereco por CEP.
          </p>
        </div>
      </section>

      <form id="form-chat" class="form-chat">
        <label for="input-mensagem" class="sr-only">Mensagem</label>
        <input
          id="input-mensagem"
          type="text"
          placeholder="Digite sua pergunta..."
          maxlength="2000"
          autocomplete="off"
          required
        />
        <button type="submit" id="btn-enviar" aria-label="Enviar mensagem">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 2 11 13" />
            <path d="M22 2 15 22l-4-9-9-4 20-7Z" />
          </svg>
        </button>
      </form>
      <p id="erro" class="erro" role="alert" hidden></p>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
